<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>藍月公會聊天室</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; display: flex; flex-direction: column; align-items: center; padding-top: 50px; }
        #chat-box { width: 400px; height: 300px; border: 1px solid #334155; overflow-y: scroll; padding: 10px; background: #1e293b; margin-bottom: 10px; border-radius: 8px; }
        .message { margin-bottom: 8px; border-bottom: 1px solid #334155; padding-bottom: 4px; }
        #chat-ui { display: none; }
        input { padding: 10px; width: 250px; border-radius: 5px; border: none; }
        button { padding: 10px 20px; border-radius: 5px; border: none; background: #3b82f6; color: white; cursor: pointer; margin-top: 5px;}
    </style>
</head>
<body>
    <h1>藍月公會聊天室</h1>
    
    <button id="login-btn" onclick="login()">使用 Google 登入</button>

    <div id="chat-ui">
        <!-- 暱稱設定區塊 -->
        <div id="setup-ui" style="margin-bottom: 20px;">
            <input type="text" id="nickname-input" placeholder="輸入你想取的暱稱...">
            <button onclick="saveNickname()">設定暱稱</button>
        </div>
        
        <div id="chat-box"></div>
        <input type="text" id="msg-input" placeholder="輸入訊息...">
        <button onclick="sendMessage()">發送</button>
        <button onclick="logout()" style="background: #ef4444;">登出</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
        import { getDatabase, ref, push, onValue, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-database.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, updateProfile, signOut } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBU9WulkRjD3cDG9dK-Pjqm5qAL2oWOw8M",
            authDomain: "bluemoonguild.firebaseapp.com",
            databaseURL: "https://bluemoonguild-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "bluemoonguild",
            storageBucket: "bluemoonguild.firebasestorage.app",
            messagingSenderId: "306033492710",
            appId: "1:306033492710:web:13149e02bb72bd8b293127",
            measurementId: "G-YP6GG5XCS3"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        window.login = () => signInWithPopup(auth, provider);
        window.logout = () => signOut(auth);

        // 設定暱稱
        window.saveNickname = async () => {
            const nickname = document.getElementById("nickname-input").value;
            if (nickname.trim() === "") return alert("請輸入暱稱！");
            await updateProfile(auth.currentUser, { displayName: nickname });
            alert("暱稱已更新為: " + nickname);
        };

        onAuthStateChanged(auth, (user) => {
            const loginBtn = document.getElementById('login-btn');
            const chatUi = document.getElementById('chat-ui');
            if (user) {
                loginBtn.style.display = 'none';
                chatUi.style.display = 'block';
                // 如果已經有設定過名字，填入輸入框
                if(user.displayName) document.getElementById("nickname-input").value = user.displayName;
            } else {
                loginBtn.style.display = 'block';
                chatUi.style.display = 'none';
            }
        });

        onValue(ref(db, 'messages'), (snapshot) => {
            const chatBox = document.getElementById("chat-box");
            chatBox.innerHTML = "";
            const data = snapshot.val();
            if (data) {
                Object.values(data).forEach((msg) => {
                    chatBox.innerHTML += `<div class="message"><b>${msg.username || '匿名'}:</b> ${msg.content}</div>`;
                });
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        });

        window.sendMessage = () => {
            const input = document.getElementById("msg-input");
            const user = auth.currentUser;
            if (input.value.trim() === "" || !user) return;
            
            push(ref(db, 'messages'), {
                content: input.value,
                username: user.displayName || "匿名",
                timestamp: serverTimestamp()
            });
            input.value = "";
        };
    </script>
</body>
</html>
