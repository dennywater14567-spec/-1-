<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>藍月公會聊天室</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; display: flex; flex-direction: column; align-items: center; padding-top: 50px; }
        #chat-box { width: 400px; height: 300px; border: 1px solid #334155; overflow-y: scroll; padding: 10px; background: #1e293b; margin-bottom: 10px; border-radius: 8px; }
        .message { margin-bottom: 8px; border-bottom: 1px solid #334155; padding-bottom: 4px; }
        #chat-ui { display: none; }
        input { padding: 10px; width: 250px; border-radius: 5px; border: none; }
        button { padding: 10px 20px; border-radius: 5px; border: none; background: #3b82f6; color: white; cursor: pointer; }
    </style>
</head>
<body>
    <h1>藍月公會聊天室</h1>
    
    <!-- 登入按鈕 -->
    <button id="login-btn" onclick="login()">使用 Google 登入</button>

    <!-- 登入後顯示的聊天介面 -->
    <div id="chat-ui">
        <div id="chat-box"></div>
        <input type="text" id="msg-input" placeholder="輸入訊息...">
        <button onclick="sendMessage()">發送</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
        import { getDatabase, ref, push, onValue, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-database.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";

        // Firebase 配置資訊
        const firebaseConfig = {
            apiKey: "AIzaSyBU9WulkRjD3cDG9dK-Pjqm5qAL2oWOw8M",
            authDomain: "bluemoonguild.firebaseapp.com",
            databaseURL: "https://bluemoonguild-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "bluemoonguild",
            storageBucket: "bluemoonguild.firebasestorage.app",
            messagingSenderId: "306033492710",
            appId: "1:306033492710:web:13149e02bb72bd8b293127",
            measurementId: "G-YP6GG5XCS3"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        // 登入功能
        window.login = () => signInWithPopup(auth, provider);

        // 監聽登入狀態
        onAuthStateChanged(auth, (user) => {
            const loginBtn = document.getElementById('login-btn');
            const chatUi = document.getElementById('chat-ui');
            if (user) {
                loginBtn.style.display = 'none';
                chatUi.style.display = 'block';
            } else {
                loginBtn.style.display = 'block';
                chatUi.style.display = 'none';
            }
        });

        // 顯示訊息
        onValue(ref(db, 'messages'), (snapshot) => {
            const chatBox = document.getElementById("chat-box");
            chatBox.innerHTML = "";
            const data = snapshot.val();
            if (data) {
                Object.values(data).forEach((msg) => {
                    chatBox.innerHTML += `<div class="message"><b>${msg.username || '匿名'}:</b> ${msg.content}</div>`;
                });
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        });

        // 發送訊息
        window.sendMessage = () => {
            const input = document.getElementById("msg-input");
            const user = auth.currentUser;
            if (input.value.trim() === "" || !user) return;
            
            push(ref(db, 'messages'), {
                content: input.value,
                username: user.displayName,
                timestamp: serverTimestamp()
            });
            input.value = "";
        };
    </script>
</body>
</html>
